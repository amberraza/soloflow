server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API calls if we were serving on same domain, 
    # but likely we'll use full URL from ENV or Railway service handling.
    # location /api {
    #     proxy_pass http://backend:8000;
    # }
}
